# Site settings
title: Zeenar Salim
tagline: "Designing learning. Building community. Sharing widely."
description: >-
  Assistant Director for Instructional Development at the University of
  Georgia's Center for Teaching and Learning. Faculty developer, instructional
  designer, and researcher working at the intersection of learning sciences, generative AI, and Data Analytics.
author: Zeenar Salim
email: salimzeenar@gmail.com
url: "https://zeenar91.github.io"
baseurl: ""

# Social / links (edit these)
social:
  linkedin: https://www.linkedin.com/in/zeenar-salim-ph-d-34a28051
  scholar: https://scholar.google.com/citations?user=CIuDpCcAAAAJ&hl=en&oi=ao
  orcid: https://orcid.org/0000-0003-1563-9037
  github: https://github.com/Zeenar91/Zeenar91.github.io

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:slug/

# Collections
collections:
  projects:
    output: true
    permalink: /portfolio/:path/
  publications:
    output: true
    permalink: /publications/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"

# Navigation
nav:
  - title: About
    url: /about/
  - title: Portfolio
    url: /portfolio/
  - title: Publications
    url: /publications/
  - title: Services
    url: /services/
  - title: Speaking
    url: /speaking/
  - title: CV
    url: /cv/
  - title: Blog
    url: /blog/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

<header class="site-header">
  <div class="wrap header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark" aria-hidden="true">Z</span>
      <span class="brand-name">{{ site.title }}</span>
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <nav id="site-nav" class="site-nav" aria-label="Primary">
      <ul>
        {% for item in site.nav %}
          <li>
            <a href="{{ item.url | relative_url }}"
               {% if page.url contains item.url and item.url != '/' %}aria-current="page"{% endif %}>
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>

<script>
  (function () {
    var toggle = document.querySelector('.nav-toggle');
    var nav = document.getElementById('site-nav');
    if (!toggle || !nav) return;
    toggle.addEventListener('click', function () {
      var open = nav.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>

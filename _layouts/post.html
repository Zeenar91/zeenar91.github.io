---
layout: default
---
<article class="post">
  <header class="page-header">
    <p class="page-kicker">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>

  <div class="page-body prose">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/blog/' | relative_url }}" class="back-link">← All posts</a>
  </footer>
</article>
